<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fakrul</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050510;
overflow:hidden;
color:white;
}

/* background galaxy */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

/* rain */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* profile card */

.card{
width:360px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 40px rgba(140,100,255,0.4);
overflow:hidden;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(40px)}
to{opacity:1;}
}

.header{
text-align:center;
padding:30px 20px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #9d7bff;
box-shadow:0 0 25px #8a7dff;
margin-bottom:10px;
}

.name{
font-size:22px;
font-weight:700;
}

.title{
font-size:13px;
opacity:0.7;
}

/* sections */

.section{
display:none;
padding:20px;
text-align:center;
}

.section.active{
display:block;
animation:fade 0.7s;
}

/* typing text */

.typing{
font-style:italic;
font-size:14px;
opacity:0.9;
min-height:40px;
}

/* social */

.social{
margin-top:15px;
}

.social a{
color:white;
margin:0 12px;
font-size:20px;
transition:0.3s;
}

.social a:hover{
color:#a78bfa;
transform:scale(1.2);
}

/* buttons */

.buttons{
display:flex;
border-top:1px solid rgba(255,255,255,0.1);
}

.buttons button{
flex:1;
padding:15px;
border:none;
background:none;
color:white;
cursor:pointer;
transition:0.3s;
}

.buttons button:hover{
background:rgba(255,255,255,0.1);
}

/* timeline */

.timeline{
text-align:left;
font-size:13px;
line-height:1.7;
}

/* contact */

.contact a{
display:block;
margin:10px 0;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.1);
text-decoration:none;
color:white;
transition:0.3s;
}

.contact a:hover{
background:#7c5cff;
}

footer{
text-align:center;
font-size:12px;
padding:10px;
opacity:0.6;
}

</style>
</head>

<body onclick="playMusic()">

<div id="particles-js"></div>

<canvas id="rain"></canvas>

<div class="card">

<div class="header">
<img class="avatar" src="https://api.betabotz.eu.org/api/tools/get-upload?id=f/wgep4ag1.jpg">
<div class="name">Fakrul</div>
<div class="title">Beban Hidup</div>
</div>

<div id="home" class="section active">

<div class="typing" id="typing"></div>

<div class="social">
<a href="https://wa.me/601172590364"><i class="fab fa-whatsapp"></i></a>
<a href="https://instagram.com/rulshz"><i class="fab fa-instagram"></i></a>
<a href="https://youtube.com/@rulshz"><i class="fab fa-youtube"></i></a>
</div>

</div>

<div id="progress" class="section">

<div class="timeline">

<div>2022 — hidup ceria tanpa masalah</div>
<div>2023 — pisah dengan kawan lama</div>
<div>2023 — masuk sekolah baru</div>
<div>2024 — hidup mula berubah</div>
<div>2024 — rasa hilang arah hidup</div>
<div>2024 — kehilangan orang tersayang</div>
<div>2025 — masih mencari diri sendiri</div>

</div>

</div>

<div id="contact" class="section contact">

<a href="https://wa.me/601172590364">WhatsApp</a>
<a href="https://t.me/rulshz">Telegram</a>
<a href="https://github.com/fahrihostingg">Github</a>

</div>

<div class="buttons">
<button onclick="show('home')">HOME</button>
<button onclick="show('progress')">PROGRESS</button>
<button onclick="show('contact')">CONTACT</button>
</div>

<footer>
© FakrulDev 2024
</footer>

</div>

<audio id="music" loop>
<source src="https://storage.neko.pe/file/Pd8lNw~74AgVto~G9FWo.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* switch tab */

function show(id){
document.querySelectorAll('.section').forEach(sec=>{
sec.classList.remove('active')
})
document.getElementById(id).classList.add('active')
}

/* music */

function playMusic(){
document.getElementById("music").play()
}

/* typing sad text */

const texts=[
"tetap tersenyum walaupun hati hancur...",
"kadang kita penat bukan sebab kerja...",
"tapi sebab perasaan yang terlalu berat...",
"aku nampak kuat, tapi sebenarnya tidak...",
"sunyi itu sakit..."
]

let i=0
let j=0
let current=""
let isDeleting=false

function type(){

current=texts[i]

if(!isDeleting){
document.getElementById("typing").textContent=current.substring(0,j++)
if(j>current.length){
isDeleting=true
setTimeout(type,2000)
return
}
}else{
document.getElementById("typing").textContent=current.substring(0,j--)
if(j==0){
isDeleting=false
i++
if(i==texts.length)i=0
}
}

setTimeout(type,isDeleting?40:70)

}

type()

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:1},
line_linked:{enable:true},
color:{value:"#ffffff"}
}
})

/* rain effect */

var canvas=document.getElementById("rain")
var ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

var rain=[]
for(let i=0;i<200;i++){
rain.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
l:Math.random()*1,
xs:-4+Math.random()*4+2,
ys:Math.random()*10+10
})
}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(174,194,224,0.5)"
ctx.lineWidth=1
ctx.lineCap="round"

for(let i=0;i<rain.length;i++){

let r=rain[i]

ctx.beginPath()
ctx.moveTo(r.x,r.y)
ctx.lineTo(r.x+r.l*r.xs,r.y+r.l*r.ys)
ctx.stroke()

}

moveRain()

}

function moveRain(){

for(let i=0;i<rain.length;i++){

let r=rain[i]

r.x+=r.xs
r.y+=r.ys

if(r.x>canvas.width||r.y>canvas.height){
r.x=Math.random()*canvas.width
r.y=-20
}

}

}

setInterval(drawRain,30)

</script>

</body>
</html>
